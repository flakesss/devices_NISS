services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: niss-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: niss-backend
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    environment:
      - MQTT_URL=mqtt://mosquitto:1883   # override .env — pakai nama service, bukan localhost
      - PI_STREAM_URL=https://pi-stream.satsetin.com/stream   # Pi di jaringan/lokasi berbeda dari PC lab — diakses lewat Cloudflare Tunnel niss-pi-stream
      - PHARYNGITIS_URL=http://pharyngitis-ws:8000
      - CS_RECONSTRUCT_URL=http://cs-reconstruct:6000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend/dist:/frontend/dist:ro  # frontend yang sudah di-build
    depends_on:
      - mosquitto
      - pharyngitis-ws
      - cs-reconstruct
    restart: unless-stopped

  # Deteksi faringitis dari foto/snapshot, dipicu on-demand oleh tombol
  # "Analisis" di frontend (bukan otomatis tiap frame) — model DenseNet121.
  pharyngitis-ws:
    build: ./pharyngitis-ws
    container_name: niss-pharyngitis-ws
    expose:
      - "8000"
    restart: unless-stopped

  # Rekonstruksi Compressive Sensing (OMP+DCT) — menerima payload biner CS
  # dari Pi lewat backend, membalas JPEG. Tidak diekspos ke publik.
  cs-reconstruct:
    build:
      context: .
      dockerfile: cs-reconstruct/Dockerfile
    container_name: niss-cs-reconstruct
    expose:
      - "6000"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: niss-cloudflared
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TOKEN}
    depends_on:
      - backend
    restart: unless-stopped

  # Expose Mosquitto (MQTT broker) ke internet lewat Cloudflare Tunnel,
  # supaya Pi di jaringan/lokasi berbeda tetap bisa connect ke broker ini.
  cloudflared-mqtt:
    image: cloudflare/cloudflared:latest
    container_name: niss-cloudflared-mqtt
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-mqtt/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-mqtt/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - mosquitto
    restart: unless-stopped
