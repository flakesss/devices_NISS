services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: niss-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: niss-backend
    ports:
      - "3000:3000"
    env_file: ./backend/.env
    environment:
      - MQTT_URL=mqtt://mosquitto:1883   # override .env — pakai nama service, bukan localhost
      - PI_STREAM_URL=http://host.docker.internal:5000/stream   # Flask stream jalan native di Pi yang sama, tidak perlu tunnel
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./frontend/dist:/frontend/dist:ro  # frontend yang sudah di-build
    depends_on:
      - mosquitto
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: niss-cloudflared
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared-backend/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared-backend/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      - backend
    restart: unless-stopped

  # cloudflared-mqtt dinonaktifkan: broker Mosquitto dan mqtt_server.py (kamera)
  # jalan di Pi yang sama, jadi tidak perlu expose MQTT ke internet.
  # Aktifkan lagi kalau nanti ada device kamera di jaringan/lokasi terpisah.
